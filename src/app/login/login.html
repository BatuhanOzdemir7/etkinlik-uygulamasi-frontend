<div class="vaporwave-container d-flex justify-content-center align-items-center min-vh-100">
  <div class="vaporwave-card p-5">
    
    <div class="glitch-wrapper mb-4">
      <h2 class="text-center neon-text" data-text="SİSTEME GİRİŞ">SİSTEME GİRİŞ</h2>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-4">
        <label for="username" class="form-label retro-label">E-Posta Bağlantısı</label>
        <input 
          type="email" 
          class="form-control retro-input" 
          id="username" 
          formControlName="username"
          placeholder="kullanici@ağ.com"
          required>
        <div class="invalid-feedback neon-error" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          [HATA] Geçerli bir ağ adresi tespit edilemedi.
        </div>
      </div>
      
      <div class="mb-4">
        <label for="password" class="form-label retro-label">Güvenlik Anahtarı</label>
        <input 
          type="password" 
          class="form-control retro-input" 
          id="password" 
          formControlName="password"
          placeholder="••••••••"
          required>
        <div class="invalid-feedback neon-error" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          [HATA] Şifre protokolü boş bırakılamaz.
        </div>
      </div>
      
      <button type="submit" class="btn vapor-btn w-100 mb-4" [disabled]="loginForm.invalid">
        OTURUMU BAŞLAT
      </button>
    </form>
    
    <div class="text-center retro-footer">
      <p class="mb-0">Veritabanında kaydın yok mu? <a routerLink="/register" class="neon-link">Ağa Katıl</a></p>
    </div>

  </div>
</div>
