<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 400px;">
    <h2 class="text-center mb-4">Giriş Yap</h2>
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="mb-3">
        <label for="username" class="form-label">E-posta</label>
        <input 
          type="email" 
          class="form-control" 
          id="username" 
          formControlName="username"
          placeholder="E-posta adresiniz"
          required>
        <div class="invalid-feedback" *ngIf="loginForm.get('username')?.invalid && loginForm.get('username')?.touched">
          Geçerli bir e-posta girin
        </div>
      </div>
      
      <div class="mb-3">
        <label for="password" class="form-label">Şifre</label>
        <input 
          type="password" 
          class="form-control" 
          id="password" 
          formControlName="password"
          placeholder="Şifreniz"
          required>
        <div class="invalid-feedback" *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
          Şifre girmek zorunludur
        </div>
      </div>
      
      <button type="submit" class="btn btn-primary w-100 mb-3" [disabled]="loginForm.invalid">
        Giriş Yap
      </button>
    </form>
    
    <hr>
    
    <div class="text-center">
      <p class="mb-0">Hesabınız yok mu? <a routerLink="/register" class="text-decoration-none">Kaydol</a></p>
    </div>
  </div>
</div>

<style>
  .min-vh-100 {
    min-height: 100vh;
  }
</style>
