<div class="vaporwave-container d-flex justify-content-center align-items-center min-vh-100">
  <div class="vaporwave-card p-4 p-md-5">

    <div class="glitch-wrapper mb-4">
      <h2 class="text-center neon-text" data-text="AĞA KAYIT">AĞA KAYIT</h2>
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <div class="mb-3">
        <label for="name" class="form-label retro-label">Birim Adı</label>
        <input 
          type="text" 
          class="form-control retro-input"
          id="name"
          formControlName="name"
          placeholder="Sisteme kayıtlanacak ad">
        <div class="invalid-feedback neon-error"
             *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          [HATA] Ad verisi en az 2 karakter olmalıdır.
        </div>
      </div>

      <div class="mb-3">
        <label for="surname" class="form-label retro-label">Birim Soyadı</label>
        <input 
          type="text" 
          class="form-control retro-input"
          id="surname"
          formControlName="surname"
          placeholder="Sisteme kayıtlanacak soyad">
        <div class="invalid-feedback neon-error"
             *ngIf="registerForm.get('surname')?.invalid && registerForm.get('surname')?.touched">
          [HATA] Soyad verisi en az 2 karakter olmalıdır.
        </div>
      </div>

      <div class="mb-3">
        <label for="email" class="form-label retro-label">E-Posta Bağlantısı</label>
        <input 
          type="email" 
          class="form-control retro-input"
          id="email"
          formControlName="email"
          placeholder="kullanici@ağ.com">
        <div class="invalid-feedback neon-error"
             *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          [HATA] Geçerli bir ağ adresi tespit edilemedi.
        </div>
      </div>

      <div class="mb-3">
        <label for="phone" class="form-label retro-label">İletişim Frekansı</label>
        <input 
          type="text" 
          class="form-control retro-input"
          id="phone"
          maxlength="10"
          pattern="[0-9]{10}"
          minlength="10"
          formControlName="phone"
          placeholder="5551234567">
        <div class="invalid-feedback neon-error"
             *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched">
          [HATA] 10 haneli iletişim frekansı zorunludur.
        </div>
      </div>

      <div class="mb-4">
        <label for="password" class="form-label retro-label">Güvenlik Anahtarı</label>
        <input 
          type="password" 
          class="form-control retro-input"
          id="password"
          formControlName="password"
          placeholder="••••••••">
        <div class="invalid-feedback neon-error"
             *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          [HATA] Güvenlik anahtarı en az 6 karakter olmalıdır.
        </div>
      </div>

      <button type="submit"
              class="btn vapor-btn w-100 mb-4"
              [disabled]="registerForm.invalid">
        SİSTEME KAYDOL
      </button>

    </form>

    <div class="text-center retro-footer">
      <p class="mb-0">
        Zaten veritabanında kaydın var mı?
        <a routerLink="" class="neon-link">Oturum Aç</a>
      </p>
    </div>
  </div>
</div>
