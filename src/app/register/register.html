<div class="container-fluid d-flex justify-content-center align-items-center min-vh-100">
  <div class="card shadow-lg p-4" style="width: 100%; max-width: 450px;">
    <h2 class="text-center mb-4">Kayıt Ol</h2>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">

      <!-- Ad -->
      <div class="mb-3">
        <label for="name" class="form-label">Ad</label>
        <input 
          type="text" 
          class="form-control"
          id="name"
          formControlName="name"
          placeholder="Adınız">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
          Ad en az 2 karakter olmalıdır
        </div>
      </div>

      <!-- Soyad -->
      <div class="mb-3">
        <label for="surname" class="form-label">Soyad</label>
        <input 
          type="text" 
          class="form-control"
          id="surname"
          formControlName="surname"
          placeholder="Soyadınız">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('surname')?.invalid && registerForm.get('surname')?.touched">
          Soyad en az 2 karakter olmalıdır
        </div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label for="email" class="form-label">E-posta</label>
        <input 
          type="email" 
          class="form-control"
          id="email"
          formControlName="email"
          placeholder="E-posta adresiniz">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
          Geçerli bir e-posta girin
        </div>
      </div>

      <!-- Telefon -->
      <div class="mb-3">
        <label for="phone" class="form-label">Telefon</label>
        <input 
          type="text" 
          class="form-control"
          id="phone"
          maxlength="10"
          pattern="[0-9]{10}"
          minlength="10"
          formControlName="phone"
          placeholder="Telefon numaranız">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('phone')?.invalid && registerForm.get('phone')?.touched">
          Telefon numarası zorunludur
        </div>
      </div>

      <!-- Şifre -->
      <div class="mb-3">
        <label for="password" class="form-label">Şifre</label>
        <input 
          type="password" 
          class="form-control"
          id="password"
          formControlName="password"
          placeholder="Şifreniz">
        <div class="invalid-feedback"
             *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
          Şifre en az 6 karakter olmalıdır
        </div>
      </div>

      <!-- Submit -->
      <button type="submit"
              class="btn btn-primary w-100 mb-3"
              [disabled]="registerForm.invalid">
        Kayıt Ol
      </button>

    </form>

    <hr>

    <!-- Login link -->
    <div class="text-center">
      <p class="mb-0">
        Zaten hesabınız var mı?
        <a routerLink="/" class="text-decoration-none">Giriş Yap</a>
      </p>
    </div>
  </div>
</div>

<style>
  .min-vh-100 {
    min-height: 100vh;
  }

  input.ng-invalid.ng-touched {
    border-color: #dc3545;
  }

  input.ng-valid.ng-touched {
    border-color: #198754;
  }

  .invalid-feedback {
    display: block;
  }
</style>
